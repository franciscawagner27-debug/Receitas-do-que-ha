<!doctype html>
<html lang="pt">
 <head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />

  <!-- 🔹 Fontes -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap"
    rel="stylesheet"
  />

  <!-- ⭐ TÍTULO MUITO IMPORTANTE PARA SEO -->
  <title>Receitas do Que Há – Site Oficial | Descubra receitas com os ingredientes que tem em casa</title>

  <!-- ⭐ META DESCRIPTION MELHORADA -->
  <meta
    name="description"
    content="O Receitas do Que Há é o site oficial onde pode descobrir receitas simples e rápidas feitas com os ingredientes que já tem em casa. Pesquise por ingredientes ou explore sugestões práticas e portuguesas."
  />

  <!-- 🔹 Keywords opcionais (mantidas) -->
  <meta
    name="keywords"
    content="receitas, cozinha portuguesa, receitas simples, receitas fáceis, receitas do que há, receitas caseiras"
  />
  <meta name="language" content="pt-PT" />

  <!-- 🔹 Ícone do site (mantido) -->
 <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32.png" />


  <!-- 🔹 Manifesto da aplicação (necessário para PWA) -->
  <link rel="manifest" href="/manifest.json" />

  <!-- 🔹 Cores e propriedades para mobile -->
  <meta name="theme-color" content="#E9DFC7" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Receitas do Que Há" />

  <!-- 🔹 Ícone da app para iPhone -->
  <link rel="apple-touch-icon" href="/icons/icon-180.png" />

  <!-- 🔹 Splash screens iOS (mantidas) -->

    rel="apple-touch-startup-image"
    href="/splash-1125x2436.png"

      body {
        background-color: #E9DFC7;
      }
    }
  </style>
